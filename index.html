<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Meu Amor ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #1a0007 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Caixa de mensagem centralizada */
        .message-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            pointer-events: none;
            width: 90%;
            max-width: 600px;
        }
        h1 {
            font-family: 'Great Vibes', cursive;
            color: #ff4b72;
            font-size: 5rem;
            margin: 0;
            text-shadow: 0 0 25px rgba(255, 75, 114, 0.7);
            opacity: 0;
        }
        p {
            color: #fff;
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-top: 10px;
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="message-container">
        <h1 id="title">Eu te amo</h1>
        <p id="subtitle">Você é o meu mundo ✨</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. CONFIGURAÇÃO DO THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 100;

        // Criar uma textura de ponto brilhante para partículas
        const createParticleTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        };
        const pTexture = createParticleTexture();

        // --- 2. PARTÍCULAS FINAS MOVIMENTADAS PARA O FUNDO (BACKDROP) ---
        const bgVertices = [];
        const bgGeometry = new THREE.BufferGeometry();
        const totalBgPoints = 800; // Poeira estelar romântica ao fundo

        for(let i = 0; i < totalBgPoints; i++) {
            const x = (Math.random() - 0.5) * 250;
            const y = (Math.random() - 0.5) * 200;
            const z = (Math.random() - 0.5) * 100 - 40; // Mais afastadas atrás
            bgVertices.push(x, y, z);
        }
        bgGeometry.setAttribute('position', new THREE.Float32BufferAttribute(bgVertices, 3));
        
        const bgMaterial = new THREE.PointsMaterial({
            color: 0xff3366,
            size: 0.5,
            map: pTexture,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const bgStars = new THREE.Points(bgGeometry, bgMaterial);
        scene.add(bgStars);

        // --- 3. CORAÇÕES EM DESTAQUE (O ELEMENTO MAIS IMPORTANTE) ---
        const backgroundHearts = [];
        const heartCount = 45; // Mais corações principais na tela

        function createHeartGeometry() {
            const geom = new THREE.BufferGeometry();
            const localVertices = [];
            const pCount = 70; // Pontos por mini-coração
            for(let i=0; i<pCount; i++) {
                const t = (i / pCount) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3) * 0.25; // Um pouco maiores e visíveis
                const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.25;
                localVertices.push(new THREE.Vector3(x, y, (Math.random() - 0.5) * 0.8));
            }
            geom.setAttribute('position', new THREE.Float32BufferAttribute(localVertices.flatMap(v => [v.x, v.y, v.z]), 3));
            return geom;
        }

        for (let i = 0; i < heartCount; i++) {
            const heartGeom = createHeartGeometry();
            const mat = new THREE.PointsMaterial({
                color: gsap.utils.random(['#ff2a55', '#ff4757', '#ff007f', '#ff6b8b']),
                size: gsap.utils.random(0.9, 1.5),
                map: pTexture,
                transparent: true,
                opacity: gsap.utils.random(0.6, 0.95),
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const heartMesh = new THREE.Points(heartGeom, mat);
            
            // Distribuição dos corações flutuantes em posições de destaque
            heartMesh.position.set(
                (Math.random() - 0.5) * 180,
                (Math.random() - 0.5) * 140 - 40,
                (Math.random() - 0.5) * 60 + 10 // Mais próximos à câmera para destaque
            );
            
            scene.add(heartMesh);
            backgroundHearts.push({
                mesh: heartMesh,
                speed: gsap.utils.random(0.12, 0.35),
                rotSpeed: gsap.utils.random(-0.015, 0.015),
                wobbleSpeed: gsap.utils.random(0.001, 0.003),
                wobbleAmount: gsap.utils.random(0.05, 0.2)
            });
        }

        // --- 4. ANIMAÇÃO DE ENTRADA DO TEXTO ---
        gsap.to("#title", { opacity: 1, y: 0, duration: 2.5, delay: 0.8, ease: "power3.out" });
        gsap.to("#subtitle", { opacity: 0.8, y: 0, duration: 2.5, delay: 1.8, ease: "power3.out" });

        // --- 5. LOOP DE RENDERIZAÇÃO ---
        function animate() {
            requestAnimationFrame(animate);

            // Movimentação lenta das partículas finas do fundo
            bgStars.rotation.z += 0.0003;
            bgStars.rotation.y += 0.0001;

            // Movimentação e animação dos corações principais
            backgroundHearts.forEach(heart => {
                heart.mesh.position.y += heart.speed;
                heart.mesh.rotation.z += heart.rotSpeed;
                
                // Efeito suave de balanço lateral (wobble)
                heart.mesh.position.x += Math.sin(Date.now() * heart.wobbleSpeed) * heart.wobbleAmount;

                // Se o coração sumir no topo, ele retorna no fundo da tela
                if (heart.mesh.position.y > 90) {
                    heart.mesh.position.y = -90;
                    heart.mesh.position.x = (Math.random() - 0.5) * 180;
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        // Responsividade para funcionar bem em computadores e celulares
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
